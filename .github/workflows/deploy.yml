name: Deploy to DigitalOcean

on:
  push:
    branches: [master]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'     
          distribution: 'temurin'
          cache: maven            

      - name: Run Unit & Integration Tests

        run: mvn clean test

  deploy:
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_USER: ${{ secrets.DB_USERNAME }}
          DB_PASS: ${{ secrets.DB_PASSWORD }}
          APP_DIR_USER: ${{ secrets.SSH_USER }} 
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_USER,DB_PASS,APP_DIR_USER
          script: |
            cd /home/$APP_DIR_USER/ERM-Employee-Item-Health-App
            
            # 1. Sync Code
            git fetch origin
            git reset --hard origin/master

            # 2. Secure Credentials
            echo "DB_USERNAME=$DB_USER" > .env
            echo "DB_PASSWORD=$DB_PASS" >> .env

            # 3. Restart Services
            /usr/bin/docker compose -f docker-compose.yml down
            /usr/bin/docker compose -f docker-compose.yml up -d --build
            
            # 4. Clean Up
            rm .env