name: Deploy to DigitalOcean

on:
  push:
    branches: [master] # This triggers the "Robot" every time you push to master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # This script runs ON your Droplet
          script: |
            cd /home/deployer

            # 1. Clone the repo if 's the first time, otherwise just pull
            if [ ! -d "ERM-Employee-Item-Health-App" ]; then
              git clone https://github.com/Kappa5400/ERM-Employee-Item-Health-App.git
            fi

            cd ERM-Employee-Item-Health-App
            git pull origin master

            # 2. Inject secrets and start the containers
            export DB_USERNAME=${{ secrets.DB_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            docker compose down
            docker compose up -d --build
