<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>ERM Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Employee Item Health Dashboard</h2>
    </div>
    <div
      sec:authorize="hasRole('BOSS')"
      class="card border-warning mb-4 shadow-sm"
    >
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h5 class="card-title text-warning mb-1">Manager Tools</h5>
          <p class="card-text small text-muted">
            Access the administrative health overview and employee management.
          </p>
        </div>
        <a th:href="@{/bossdashboard}" class="btn btn-warning">
          Go to Boss Dashboard →
        </a>
      </div>
    </div>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-danger btn-sm">
        Logout
      </button>
    </form>
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    <table class="table table-striped table-hover border">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="emp : ${employeeList}">
          <td th:text="${emp.employeeId}">0</td>
          <td th:text="${emp.name ?: 'Unknown'}">Name</td>
          <td>
            <a
              th:href="@{/view/employee/{id}(id=${emp.employeeId})}"
              class="btn btn-info btn-sm"
            >
              View Detail
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
