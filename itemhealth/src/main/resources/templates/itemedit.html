<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Item</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h3 th:text="'Edit ' + ${#strings.capitalize(type)}">Edit Item</h3>
      </div>
      <div class="card-body">
        <form th:action="@{/{t}/update(t=${type})}" method="post">
          <input
            type="hidden"
            name="id"
            th:value="${type == 'laptop' ? item.laptopId : (type == 'car' ? item.carId : item.idCardId)}"
          />

          <div th:if="${type == 'laptop'}" class="mb-3">
            <label class="form-label">OS Version</label>
            <input
              type="number"
              name="osVersion"
              class="form-control"
              th:value="${item.osVersion}"
            />
            <label class="form-label mt-2">Model Year</label>
            <input
              type="number"
              name="laptopYear"
              class="form-control"
              th:value="${item.laptopYear}"
            />
          </div>

          <div th:if="${type == 'car'}" class="mb-3">
            <label class="form-label">Mileage</label>
            <input
              type="number"
              name="milage"
              class="form-control"
              th:value="${item.milage}"
            />
            <label class="form-label mt-2">Car Year</label>
            <input
              type="number"
              name="carYear"
              class="form-control"
              th:value="${item.carYear}"
            />
          </div>

          <div th:if="${type == 'idcard'}" class="mb-3">
            <label class="form-label">Needs Renewal Date</label>
            <input
              type="date"
              name="needToRenewDate"
              class="form-control"
              th:value="${item.needToRenewDate}"
            />
          </div>

          <div class="mt-4">
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a th:href="@{/bossdashboard}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
