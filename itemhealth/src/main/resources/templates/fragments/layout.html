<head th:fragment="common-head(title)">
  <meta charset="UTF-8" />
  <title th:text="${title}">ERM System</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<nav
  th:fragment="navbar"
  class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"
>
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">HealthApp ERM</a>
    <div class="navbar-nav ms-auto">
      <span class="nav-link text-light" sec:authentication="name">User</span>
      <form th:action="@{/logout}" method="post" class="ms-2">
        <button class="btn btn-outline-danger btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>
