<div th:fragment="asset-view(employee, laptop, car, idcard)">
  <div class="card shadow-sm border-0" th:if="${employee != null}">
    <ul class="list-group list-group-flush">
      <li
        class="list-group-item d-flex justify-content-between align-items-center py-3"
      >
        <div>
          <i class="bi bi-laptop me-2"></i><strong>Laptop:</strong>
          <span
            th:text="${laptop != null ? laptop : 'None assigned'}"
            th:classappend="${laptop?.needToUpdate} ? 'text-danger fw-bold' : ''"
          ></span>
          <span th:if="${laptop?.needToUpdate}" class="badge bg-danger ms-2"
            >Update Required</span
          >
        </div>
      </li>

      <li
        class="list-group-item d-flex justify-content-between align-items-center py-3"
      >
        <div>
          <i class="bi bi-car-front me-2"></i><strong>Car:</strong>
          <span
            th:text="${car != null ? car : 'None assigned'}"
            th:classappend="${car?.toService} ? 'text-warning fw-bold' : ''"
          ></span>
        </div>
      </li>

      <li
        class="list-group-item d-flex justify-content-between align-items-center py-3"
      >
        <div>
          <i class="bi bi-person-badge me-2"></i><strong>ID Card:</strong>
          <span
            th:text="${idcard != null ? idcard : 'None assigned'}"
            th:classappend="${idcard?.toRenew} ? 'text-danger fw-bold' : ''"
          ></span>
        </div>
      </li>
    </ul>
  </div>
</div>

<div th:fragment="asset-management(employee, laptop, car, idcard)">
  <div class="card shadow-sm border-warning" th:if="${employee != null}">
    <ul class="list-group list-group-flush">
      <li
        class="list-group-item d-flex justify-content-between align-items-center py-3"
      >
        <div>
          <strong>Laptop:</strong>
          <span th:text="${laptop != null ? laptop : 'None assigned'}"></span>
        </div>
        <div th:if="${laptop != null}" class="btn-group">
          <a
            th:href="@{/laptop/edit/{id}(id=${laptop.laptopId})}"
            class="btn btn-sm btn-outline-primary"
            >Update</a
          >
          <form
            th:action="@{/laptop/delete/{id}(id=${laptop.laptopId})}"
            method="post"
            class="ms-1"
          >
            <button
              type="submit"
              class="btn btn-sm btn-outline-danger"
              onclick="return confirm('Confirm deletion of Laptop?');"
            >
              Delete
            </button>
          </form>
        </div>
        <div th:unless="${laptop != null}">
          <a
            th:href="@{/laptop/create(employeeId=${employee.employeeId})}"
            class="btn btn-sm btn-success"
            >Create</a
          >
        </div>
      </li>

      <li
        class="list-group-item d-flex justify-content-between align-items-center py-3"
      >
        <div>
          <strong>Car:</strong>
          <span th:text="${car != null ? car : 'None assigned'}"></span>
        </div>
        <div th:if="${car != null}" class="btn-group">
          <a
            th:href="@{/car/edit/{id}(id=${car.carId})}"
            class="btn btn-sm btn-outline-primary"
            >Update</a
          >
          <form
            th:action="@{/car/delete/{id}(id=${car.carId})}"
            method="post"
            class="ms-1"
          >
            <button
              type="submit"
              class="btn btn-sm btn-outline-danger"
              onclick="return confirm('Confirm deletion of Car?');"
            >
              Delete
            </button>
          </form>
        </div>
        <div th:unless="${car != null}">
          <a
            th:href="@{/car/create(employeeId=${employee.employeeId})}"
            class="btn btn-sm btn-success"
            >Create</a
          >
        </div>
      </li>

      <li
        class="list-group-item d-flex justify-content-between align-items-center py-3"
      >
        <div>
          <strong>ID Card:</strong>
          <span th:text="${idcard != null ? idcard : 'None assigned'}"></span>
        </div>
        <div th:if="${idcard != null}" class="btn-group">
          <a
            th:href="@{/idcard/edit/{id}(id=${idcard.idCardId})}"
            class="btn btn-sm btn-outline-primary"
            >Update</a
          >
          <form
            th:action="@{/idcard/delete/{id}(id=${idcard.idCardId})}"
            method="post"
            class="ms-1"
          >
            <button
              type="submit"
              class="btn btn-sm btn-outline-danger"
              onclick="return confirm('Confirm deletion of ID Card?');"
            >
              Delete
            </button>
          </form>
        </div>
        <div th:unless="${idcard != null}">
          <a
            th:href="@{/idcard/create(employeeId=${employee.employeeId})}"
            class="btn btn-sm btn-success"
            >Create</a
          >
        </div>
      </li>
    </ul>
  </div>
</div>
