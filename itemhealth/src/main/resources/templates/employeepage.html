<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Employee Details</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 th:text="${employee.name}">Employee Name</h2>
      <a th:href="@{/}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm">
      <ul class="list-group list-group-flush">
        <li class="list-group-item">
          <strong>Laptop:</strong>
          <span
            th:text="${laptop != null ? laptop.model : 'None assigned'}"
          ></span>
        </li>
        <li class="list-group-item">
          <strong>Car:</strong>
          <span th:text="${car != null ? car.model : 'None assigned'}"></span>
        </li>
        <li class="list-group-item">
          <strong>ID Card:</strong>
          <span
            th:text="${idcard != null ? idcard.cardNumber : 'None assigned'}"
          ></span>
        </li>
      </ul>
    </div>
  </body>
</html>
