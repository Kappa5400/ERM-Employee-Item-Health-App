<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/layout :: common-head('Add New Employee')}"
  ></head>
  <body class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-success text-white">
        <h3 class="mb-0"><i class="bi bi-person-plus"></i> Add New Employee</h3>
      </div>

      <div class="card-body">
        <form id="employee-form">
          <input type="hidden" id="isCreate" value="true" />
          <input type="hidden" name="_csrf" th:value="${_csrf.token}" />

          <div class="row g-3">
            <div class="col-md-12">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                id="emp-name"
                class="form-control"
                placeholder="e.g. Colin Burdett"
                required
              />
            </div>

            <div class="col-md-6">
              <div class="form-check form-switch mt-4">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="emp-boss-role"
                />
                <label class="form-check-label" for="emp-boss-role"
                  >Boss Privileges (Role: BOSS)</label
                >
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-check form-switch mt-4">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="emp-has-boss"
                  checked
                />
                <label class="form-check-label" for="emp-has-boss"
                  >Reports to a Boss</label
                >
              </div>
            </div>
          </div>

          <div class="mt-4 border-top pt-3">
            <button
              type="button"
              onclick="saveEmployee()"
              class="btn btn-primary"
            >
              Create Employee
            </button>
            <a th:href="@{/bossdashboard}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>

    <script th:src="@{/js/item_handler.js}"></script>

    <script>
      async function saveEmployee() {
        const name = document.getElementById("emp-name").value;
        const isBoss = document.getElementById("emp-boss-role").checked;
        const hasBoss = document.getElementById("emp-has-boss").checked;
        const token = document.querySelector('input[name="_csrf"]')?.value;

        const payload = {
          name: name,
          bossRole: isBoss,
          hasBoss: hasBoss,
        };

        try {
          const response = await fetch("/api/employee", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRF-TOKEN": token,
            },
            body: JSON.stringify(payload),
          });

          if (response.ok) {
            window.location.href = "/bossdashboard";
          } else {
            alert("Error creating employee.");
          }
        } catch (e) {
          console.error(e);
        }
      }
    </script>
  </body>
</html>
