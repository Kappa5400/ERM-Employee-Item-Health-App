<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>ERM Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Boss Dashboard</h2>
    </div>
    <div
      sec:authorize="hasRole('BOSS')"
      class="card border-warning mb-4 shadow-sm"
    >
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h5 class="card-title text-warning mb-1">Employee view</h5>
          <p class="card-text small text-muted">Regular employee view.</p>
        </div>
        <a th:href="@{/}" class="btn btn-warning"> Go back → </a>
      </div>
    </div>
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    <table class="table table-striped table-hover border">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="emp : ${employeeList}">
          <td th:text="${emp.employeeId}">0</td>
          <td th:text="${emp.name ?: 'Unknown'}">Name</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
