<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/layout :: common-head('Boss Dashboard')}"
  ></head>
  <body class="bg-light">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <main class="container">
      <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
          <h2 class="fw-bold">Boss Dashboard</h2>
          <div class="d-flex gap-2">
            <a th:href="@{/employee/create}" class="btn btn-success shadow-sm">
              <i class="bi bi-person-plus"></i> Add Employee
            </a>
            <a th:href="@{/}" class="btn btn-outline-secondary shadow-sm">
              <i class="bi bi-arrow-left"></i> ← Back to Employee View
            </a>
          </div>
        </div>

        <div class="col-md-8">
          <h3 class="mb-3">Employee Directory</h3>
          <div
            th:replace="~{fragments/tables :: bossemployee-list(${employeeList}, true)}"
          ></div>
        </div>
      </div>
    </main>
  </body>
</html>
