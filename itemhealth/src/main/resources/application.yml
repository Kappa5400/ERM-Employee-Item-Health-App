spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  mybatis:
    configuration:
      map-underscore-to-camel-case: true
