spring.application.name=itemhealth

# --- Server & Proxy Settings ---
# Tells Spring to trust the headers sent by Nginx/Cloudflare
server.forward-headers-strategy=framework
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b

# --- Database Settings ---
# CRITICAL: Use the service name 'db' from docker-compose, not localhost
spring.datasource.url=jdbc:postgresql://db:5432/itemhealth
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- MyBatis Settings ---
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis.configuration.map-underscore-to-camel-case=true

# --- Mail Settings ---
# CRITICAL: Use the service name 'mailhog' from docker-compose
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.username=${SPRING_MAIL_USERNAME:admin@example.com}

# --- Security & Optimization ---
# Disable H2 console in production to prevent unauthorized access
spring.h2.console.enabled=false 
spring.jmx.enabled=false
spring.thymeleaf.cache=false