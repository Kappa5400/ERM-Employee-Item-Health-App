<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Email Preview</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
  </head>
  <body class="bg-light p-5">
    <div class="container bg-white p-4 shadow-sm rounded">
      <h2 class="fw-bold mb-4">
        <i class="bi bi-mailbox"></i> Recent Sent Emails
      </h2>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <table class="table table-hover mt-2">
        <thead class="table-dark">
          <tr>
            <th>Recipient</th>
            <th>Subject</th>
            <th>Sent At</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="msg : ${mailData}">
            <td th:text="${msg.Content.Headers.To[0]}"></td>
            <td th:text="${msg.Content.Headers.Subject[0]}"></td>
            <td th:text="${#strings.substring(msg.Created, 0, 19)}"></td>
          </tr>
        </tbody>
      </table>
      <a th:href="@{/bossdashboard}" class="btn btn-outline-secondary mt-3">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
      </a>
    </div>
  </body>
</html>
