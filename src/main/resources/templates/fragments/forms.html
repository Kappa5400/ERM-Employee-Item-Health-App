<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="car-fields(item)" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Model Year</label>
        <input
          type="number"
          id="carYear"
          name="carYear"
          class="form-control"
          th:value="${item?.carYear}"
          placeholder="e.g. 2024"
          required
        />
      </div>
      <div class="col-md-6">
        <label class="form-label">Mileage</label>
        <input
          type="number"
          id="milage"
          name="milage"
          class="form-control"
          th:value="${item?.milage}"
          placeholder="Current mileage"
          required
        />
      </div>

      <div class="col-md-6">
        <label class="form-label">Last Serviced Date</label>
        <input
          type="date"
          id="lastServiced"
          name="lastServiced"
          class="form-control"
          th:value="${item?.lastServiced}"
          required
        />
      </div>
      <div class="col-md-6">
        <label class="form-label">Next Service Due</label>
        <input
          type="date"
          id="needToServiceDate"
          name="needToServiceDate"
          class="form-control"
          th:value="${item?.needToServiceDate}"
          required
        />
      </div>

      <div class="col-md-6">
        <label class="form-label">Last Insurance Renewal</label>
        <input
          type="date"
          id="lastInsuranceRenewal"
          name="lastInsuranceRenewal"
          class="form-control"
          th:value="${item?.lastInsuranceRenewal}"
          required
        />
      </div>
      <div class="col-md-6">
        <label class="form-label">Insurance Expiry Date</label>
        <input
          type="date"
          id="insuranceExpireDate"
          name="insuranceExpireDate"
          class="form-control"
          th:value="${item?.insuranceExpireDate}"
          required
        />
      </div>

      <div class="col-12 mt-4">
        <div class="row">
          <div class="col-md-3">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="toService"
                name="toService"
                th:checked="${item?.toService}"
              />
              <label class="form-check-label" for="toService"
                >Needs Service</label
              >
            </div>
          </div>
          <div class="col-md-3">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="toRenewInsurance"
                name="toRenewInsurance"
                th:checked="${item?.toRenewInsurance}"
              />
              <label class="form-check-label" for="toRenewInsurance"
                >Renew Insurance</label
              >
            </div>
          </div>
          <div class="col-md-3">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="toReplace"
                name="toReplace"
                th:checked="${item?.toReplace}"
              />
              <label class="form-check-label" for="toReplace"
                >Replace Car</label
              >
            </div>
          </div>
          <div class="col-md-3">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="inUse"
                name="inUse"
                th:checked="${item?.inUse ?: true}"
              />
              <label class="form-check-label" for="inUse"
                >Currently In Use</label
              >
            </div>
          </div>
        </div>
      </div>
    </div>
    <div th:fragment="id_card_fields(item)" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Last Renewed Date</label>
        <input
          type="date"
          id="lastRenewedDate"
          name="lastRenewedDate"
          class="form-control"
          th:value="${item?.lastRenewedDate ?: #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
          required
        />
      </div>
      <div class="col-md-6">
        <label class="form-label">Next Renewal Due</label>
        <input
          type="date"
          id="needToRenewDate"
          name="needToRenewDate"
          class="form-control"
          th:value="${item?.needToRenewDate ?: #temporals.format(#temporals.createNow().plusYears(2), 'yyyy-MM-dd')}"
          required
        />
      </div>

      <div class="col-12 mt-3">
        <div class="row">
          <div class="col-md-6">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="toRenew"
                name="toRenew"
                th:checked="${item?.toRenew}"
              />
              <label class="form-check-label" for="toRenew"
                >Mark for Renewal</label
              >
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="inUse"
                name="inUse"
                th:checked="${item?.inUse ?: true}"
              />
              <label class="form-check-label" for="inUse"
                >Card Active/In Use</label
              >
            </div>
          </div>
        </div>
      </div>
    </div>
    <div th:fragment="laptop-fields(item)" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Laptop Model Year</label>
        <input
          type="number"
          id="laptopYear"
          name="laptopYear"
          class="form-control"
          th:value="${item?.laptopYear ?: #temporals.year(#temporals.createNow())}"
          placeholder="e.g. 2023"
          required
        />
      </div>
      <div class="col-md-6">
        <label class="form-label">OS Version</label>
        <input
          type="number"
          id="osVersion"
          name="osVersion"
          class="form-control"
          th:value="${item?.osVersion ?: 1}"
          min="1"
          placeholder="e.g. 11"
          required
        />
      </div>

      <div class="col-md-12">
        <label class="form-label">Last OS Update Timestamp</label>
        <input
          type="datetime-local"
          id="lastOSUpdate"
          name="lastOSUpdate"
          class="form-control"
          th:value="${item?.lastOSUpdate ?: #temporals.format(#temporals.createNow(), 'yyyy-MM-dd''T''HH:mm')}"
          required
        />
      </div>

      <div class="col-12 mt-3">
        <div class="row">
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="needToUpdate"
                name="needToUpdate"
                th:checked="${item?.needToUpdate}"
              />
              <label class="form-check-label" for="needToUpdate"
                >Needs Update</label
              >
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="toRenew"
                name="toRenew"
                th:checked="${item?.toRenew}"
              />
              <label class="form-check-label" for="toRenew"
                >Renew Lease/Plan</label
              >
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                id="inUse"
                name="inUse"
                th:checked="${item?.inUse ?: true}"
              />
              <label class="form-check-label" for="inUse"
                >Currently In Use</label
              >
            </div>
          </div>
        </div>
      </div>
    </div>
    <div th:fragment="id_card_fields(item)" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Last Renewed Date</label>
        <input
          type="date"
          id="lastRenewedDate"
          name="lastRenewedDate"
          class="form-control"
          th:value="${item?.lastRenewedDate ?: #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
          required
        />
        <div class="form-text">前回更新した日（または発行日）</div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Next Renewal Due</label>
        <input
          type="date"
          id="needToRenewDate"
          name="needToRenewDate"
          class="form-control"
          th:value="${item?.needToRenewDate ?: #temporals.format(#temporals.createNow().plusYears(2), 'yyyy-MM-dd')}"
          required
        />
        <div class="form-text">次回の更新期限（デフォルトは2年後）</div>
      </div>

      <div class="col-12 mt-4">
        <div class="row">
          <div class="col-md-6">
            <div class="form-check form-switch p-3 border rounded">
              <input
                class="form-check-input ms-0"
                type="checkbox"
                id="toRenew"
                name="toRenew"
                th:checked="${item?.toRenew}"
              />
              <label class="form-check-label ms-2" for="toRenew">
                <strong>Mark for Renewal</strong><br />
                <small class="text-muted">更新手続きが必要な場合にオン</small>
              </label>
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-check form-switch p-3 border rounded">
              <input
                class="form-check-input ms-0"
                type="checkbox"
                id="inUse"
                name="inUse"
                th:checked="${item?.inUse ?: true}"
              />
              <label class="form-check-label ms-2" for="inUse">
                <strong>Currently In Use</strong><br />
                <small class="text-muted"
                  >カードが現在有効で利用中ならオン</small
                >
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
