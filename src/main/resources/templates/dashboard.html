<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head
    th:replace="~{fragments/layout :: common-head('Employee Item Health Dashboard')}"
  ></head>
  <body class="bg-light">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <main class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Employee Item Health Dashboard</h2>
      </div>

      <div
        sec:authorize="hasRole('BOSS')"
        class="card border-warning mb-4 shadow-sm border-2"
      >
        <div
          class="card-body d-flex justify-content-between align-items-center"
        >
          <div>
            <h5 class="card-title text-warning fw-bold mb-1">Manager Tools</h5>
            <p class="card-text small text-muted mb-0">
              Access the administrative health overview and employee management.
            </p>
          </div>
          <a th:href="@{/bossdashboard}" class="btn btn-warning fw-bold">
            Go to Boss Dashboard →
          </a>
        </div>
      </div>

      <div th:replace="~{fragments/alerts :: flash-message}"></div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <div
            th:replace="~{fragments/tables :: employee-list(${employeeList}, true)}"
          ></div>
        </div>
      </div>
    </main>

 
  </body>
</html>
