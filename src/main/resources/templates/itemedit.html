<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/layout :: common-head('Edit ' + ${#strings.capitalize(type)})}"
  ></head>
  <body class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h3 th:text="'Edit ' + ${#strings.capitalize(type)}">Edit Item</h3>
      </div>
      <div class="card-body">
        <form id="edit-form">
          <input type="hidden" id="item-type" th:value="${type}" />
          <input type="hidden" id="isCreate" value="false" /> <input
            type="hidden"
            id="item-id"
            th:value="${type == 'laptop' ? item.laptopId : (type == 'car' ? item.carId : (type == 'id-card' ? item.idCardId : ''))}"
          />

          <input
            type="hidden"
            id="employee-id"
            th:value="${item?.employee?.employeeId}"
          />
          <input
            type="hidden"
            id="emp-boss-role"
            th:value="${item?.employee?.bossRole ?: false}"
          />
          <input
            type="hidden"
            id="emp-has-boss"
            th:value="${item?.employee?.hasBoss ?: false}"
          />

          <th:block th:if="${type == 'laptop'}">
            <div th:replace="~{fragments/forms :: laptop-fields(${item})}"></div>
          </th:block>

          <th:block th:if="${type == 'car'}">
            <div th:replace="~{fragments/forms :: car-fields(${item})}"></div>
          </th:block>

          <th:block th:if="${type == 'id-card'}">
            <div th:replace="~{fragments/forms :: id_card_fields(${item})}"></div>
          </th:block>

          <div class="mt-4 border-top pt-3">
            <button type="button" onclick="saveData()" class="btn btn-success">
              <i class="bi bi-save"></i> Save Changes
            </button>
            <a th:href="@{/bossdashboard}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>

    <script type="module" th:src="@{/js/app.js}"></script>
  </body>
</html>
