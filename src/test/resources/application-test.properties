# 1. Datasource Configuration
# Using MODE=PostgreSQL helps H2 understand Postgres-specific syntax used in your app
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. JPA / Hibernate Configuration
# 'none' or 'validate' is good if you want Flyway to handle the schema
# 'update' is easier for quick unit testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. Flyway Configuration
# Usually disabled for unit tests to save time, but set to 'true' if you want to test migrations
spring.flyway.enabled=false

# 4. MyBatis Configuration
mybatis.type-aliases-package=com.healthapp.itemhealth.model
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.configuration.map-underscore-to-camel-case=true