version: "3.8"

services:
  db:
    image: postgres:15
    container_name: itemhealth-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: itemhealth
    deploy:
      resources:
        limits:
          memory: 512M # Prevents DB from eating all 2GB RAM

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    restart: always
    # Ports 1025/8025 don't need to be exposed to the internet
    # if you only use them internally.

  app:
    build: .
    container_name: itemhealth-app
    restart: always
    ports:
      - "8080:8080" # Match this to your Nginx proxy_pass
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/itemhealth
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
    depends_on:
      - db
      - mailhog
    deploy:
      resources:
        limits:
          memory: 1G # Leave room for the OS and DB
