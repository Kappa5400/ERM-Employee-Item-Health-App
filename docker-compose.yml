version: "3.8"
 
services:
  db:
    image: postgres:15
    container_name: itemhealth-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: itemhealth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d itemhealth"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
 
  app:
    build: .
    container_name: itemhealth-app
    user: root
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/itemhealth
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DOCKER_API_VERSION=1.43
      - MAVEN_OPTS=-Xmx1024m
    depends_on:
      db:
        # FIX: was service_started — app was connecting before postgres was
        # accepting connections, causing random startup failures
        condition: service_healthy
    restart: on-failure
 
  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
