version: "3.8"
services:
  db:
    image: postgres:15
    container_name: itemhealth-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: itemhealth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d itemhealth"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  app:
    build: .
    container_name: itemhealth-app
    # 1. Ubuntu環境で docker.sock を叩くための権限設定
    user: root 
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/itemhealth
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DOCKER_API_VERSION=1.43 # 2. APIバージョン不一致エラーの防止
    depends_on:
      db:
        condition: service_healthy
